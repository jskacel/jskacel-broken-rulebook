---
- name: Listen for events on a webhook from webhook
  hosts: localhost
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5002
  rules:
    - name: Read raw payload 
      condition: event.meta is defined or event.payload is defined or event.payload.message == "Ansible is super cool!"
      action: 
        debug:
          msg: "The value is {{ event.payload }}"
